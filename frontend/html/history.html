{% extends "template.html" %}

{% block title %}История запросов{% endblock %}

{% block content %}
<div class="history-container">
    <div class="history-header">
        <h1><i class="fas fa-history"></i> История запросов</h1>
        <button class="clear-history-btn" id="clearHistoryBtn">
            <i class="fas fa-trash-alt"></i> Очистить историю
        </button>
    </div>

    <div class="history-filters">
        <select id="historyFilterType">
            <option value="all">Все типы</option>
            <option value="humanizer">Гуманайзер</option>
            <option value="detector">Детектор</option>
            <option value="paraphraser">Перефразер</option>
        </select>
        <select id="historyFilterDate">
            <option value="all">За всё время</option>
            <option value="today">Сегодня</option>
            <option value="week">За неделю</option>
            <option value="month">За месяц</option>
        </select>
    </div>

    <div class="history-list" id="historyList">
        <div class="history-empty">История пуста</div>
    </div>

    <div class="history-pagination" id="historyPagination" style="display: none;">
        <button id="prevPageBtn" disabled>← Назад</button>
        <span id="pageInfo">Страница 1</span>
        <button id="nextPageBtn">Вперед →</button>
    </div>
</div>

<style>
.history-container {
    max-width: 1000px;
    margin: 0 auto;
}

.history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
}

.history-header h1 {
    margin: 0;
}

.clear-history-btn {
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid #ef4444;
    color: #ef4444;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
}

.clear-history-btn:hover {
    background: rgba(239, 68, 68, 0.2);
}

.history-filters {
    display: flex;
    gap: 1rem;
    margin-bottom: 1.5rem;
}

.history-filters select {
    background: var(--bg-card);
    border: 1px solid var(--sidebar-border-color);
    color: var(--text-color);
    padding: 8px 12px;
    border-radius: 8px;
}

.history-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    min-height: 400px;
}

.history-item {
    background: var(--bg-card);
    border: 1px solid var(--sidebar-border-color);
    border-radius: 12px;
    padding: 1rem;
    transition: all 0.2s;
}

.history-item:hover {
    border-color: #7c3aed;
}

.history-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
    font-size: 0.8rem;
    color: var(--text-secondary);
}

.history-item-type {
    background: rgba(124, 58, 237, 0.2);
    padding: 2px 8px;
    border-radius: 20px;
    color: #a855f7;
}

.history-item-date {
    opacity: 0.6;
}

.history-item-original {
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
    opacity: 0.9;
}

.history-item-result {
    font-size: 0.9rem;
    padding-left: 0.5rem;
    border-left: 2px solid #7c3aed;
}

.history-empty {
    text-align: center;
    padding: 3rem;
    color: var(--text-secondary);
    opacity: 0.6;
}

.history-pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 1rem;
    margin-top: 2rem;
}

.history-pagination button {
    background: var(--bg-card);
    border: 1px solid var(--sidebar-border-color);
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-color);
}

.history-pagination button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
</style>
{% endblock %}

{% block scripts %}
<script src="/js/history.js" defer></script>
{% endblock %}
