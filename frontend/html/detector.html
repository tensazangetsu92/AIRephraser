{% extends "template.html" %}

{% block title %}Детектор ИИ{% endblock %}

{% block content %}

<div class="editor" id="editorContainer">
    <div class="col" id="inputCol">
        <div class="textarea-wrapper">
            <div class="editor-name">Ваш текст</div>
            <textarea id="input" placeholder="Вставьте текст для проверки на ИИ..."></textarea>
            <button class="paste-btn" id="pasteBtn">
                <i class="fas fa-paste"></i>
                Вставить текст
            </button>
        </div>
        <div class="word-counter-wrapper">
            <span class="word-count" id="wordCount"></span>
            <span class="word-warning" id="wordWarning"></span>
            <button class="copy-text-btn" id="copyInputBtn" title="Копировать текст">
                <i class="fa-regular fa-clone"></i>
            </button>
        </div>
    </div>

    <div class="col result-col" id="resultCol" style="display: none;">
        <div class="editor-name">Результат</div>
        <div id="result" class="output detector-output" placeholder="Результат появится здесь..."></div>
    </div>

    <div class="col detector-report-col" id="detectorReportCol" style="display: none;">
        <div class="editor-name">Вероятный анализ</div>
        <div class="detector-report-body">
            <div class="detector-chart-wrapper">
                <svg viewBox="0 0 120 120" class="detector-chart" id="detectorChart">
                    <circle cx="60" cy="60" r="50" fill="none" stroke="#313130" stroke-width="14"></circle>
                    <circle id="chartHuman" cx="60" cy="60" r="50" fill="none" stroke="#22c55e" stroke-width="14" stroke-dasharray="0 314" transform="rotate(-90 60 60)"></circle>
                    <circle id="chartMixed" cx="60" cy="60" r="50" fill="none" stroke="#f59e0b" stroke-width="14" stroke-dasharray="0 314" transform="rotate(-90 60 60)"></circle>
                    <circle id="chartAi" cx="60" cy="60" r="50" fill="none" stroke="#ef4444" stroke-width="14" stroke-dasharray="0 314" transform="rotate(-90 60 60)"></circle>
                </svg>
                <div class="detector-chart-center" id="detectorChartCenter">0%</div>
            </div>
            <div class="detector-legend">
                <div class="detector-legend-item">
                    <span class="detector-dot detector-dot-human"></span>
                    <span class="detector-legend-label">Человек</span>
                    <span class="detector-legend-value" id="legendHuman">0%</span>
                </div>
                <div class="detector-legend-item">
                    <span class="detector-dot detector-dot-mixed"></span>
                    <span class="detector-legend-label">Смешанный</span>
                    <span class="detector-legend-value" id="legendMixed">0%</span>
                </div>
                <div class="detector-legend-item">
                    <span class="detector-dot detector-dot-ai"></span>
                    <span class="detector-legend-label">ИИ</span>
                    <span class="detector-legend-value" id="legendAi">0%</span>
                </div>
            </div>
            <div class="detector-verdict" id="detectorVerdict"></div>
        </div>
        <button class="detector-new-check-btn" id="newCheckBtn">
            <i class="fas fa-redo"></i> Новая проверка
        </button>
    </div>
</div>

<div class="controls">
    <div class="control-group">
        <button class="main-btn" id="detectBtn">Проверить текст</button>
    </div>
</div>

{% endblock %}

{% block scripts %}
<script src="/js/detector.js" defer></script>
<script src="/js/main.js" defer></script>
{% endblock %}
