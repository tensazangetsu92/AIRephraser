<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIRephraser</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="logo">AIRephraser</div>
    <div class="user-info" id="userInfo">
        <span class="user-name" id="userName"></span>
        <button class="nav-btn" id="authBtn">👤 Войти</button>
    </div>
</nav>

<!-- Main Content -->
<main class="container">
    <h1>AIRephraser</h1>
    <p class="subtitle">Превращаем ИИ-текст в живые слова</p>

    <!-- Editor Section -->
    <div class="editor">
        <div class="col">
            <h3>📝 Ввод</h3>
            <textarea id="input" placeholder="Вставьте текст для обработки..."></textarea>
        </div>
        <div class="col">
            <h3 class="out-text">✨ Результат</h3>
            <div id="result" class="output">Результат появится здесь...</div>
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <div class="control-group">
            <label>⚡ Сила изменения</label>
            <select id="intensity">
                <option value="low">Слабая</option>
                <option value="medium" selected>Нормальная</option>
                <option value="high">Сильная</option>
            </select>
        </div>

        <div class="control-group">
            <label>🎭 Тон</label>
            <select id="tone">
                <option value="neutral">Нейтральный</option>
                <option value="formal">Формальный</option>
                <option value="casual">Повседневный</option>
                <option value="friendly">Дружелюбный</option>
                <option value="academic">Академический</option>
            </select>
        </div>

        <div class="control-group">
            <label>✍️ Стиль</label>
            <select id="style">
                <option value="simple">Простой</option>
                <option value="creative">Креативный</option>
                <option value="professional">Профессиональный</option>
            </select>
        </div>

        <div class="control-group">
            <label>📏 Длина</label>
            <select id="length">
                <option value="same">Оставить</option>
                <option value="shorter">Короче</option>
                <option value="longer">Длиннее</option>
            </select>
        </div>
    </div>

    <!-- Buttons -->
    <button class="main-btn" id="humanizeBtn">🚀 Очеловечить текст</button>
    <button class="copy-btn" id="copyBtn">📋 Скопировать результат</button>
</main>

<!-- Единая форма входа/регистрации -->
<div id="authModal" class="modal">
    <div class="modal-content">
        <!-- Кнопка закрытия -->
        <span class="modal-close">&times;</span>

        <!-- Заголовок меняется в зависимости от режима -->
        <h2 id="authTitle">🔐 Вход</h2>

        <!-- Сообщения об ошибках -->
        <div id="authError" class="error-message" style="display: none;"></div>

        <!-- Форма -->
        <div id="authForm">
            <!-- Email -->
            <input type="email" id="authEmail" placeholder="Email" autocomplete="email" required>

            <!-- Пароль -->
            <input type="password" id="authPassword" placeholder="Пароль" autocomplete="current-password" required>

            <!-- Подтверждение пароля (только для регистрации) -->
            <input type="password" id="authConfirmPassword" placeholder="Подтвердите пароль" style="display: none;" autocomplete="new-password">

            <!-- Кнопка действия (Войти/Зарегистрироваться) -->
            <button id="authSubmitBtn">Войти</button>
        </div>

        <!-- Google вход -->
        <button id="googleLoginBtn" class="google-btn">
            🌐 Войти через Google
        </button>

        <!-- Переключение режима -->
        <div class="modal-link" id="toggleAuthMode">
            📝 Нет аккаунта? Зарегистрироваться
        </div>
    </div>
</div>

<script src="/js/api.js" defer></script>
<script src="/js/auth.js" defer></script>
<script src="/js/main.js" defer></script>
</body>
</html>
